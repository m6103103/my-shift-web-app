<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>排班表</title>
    
    <!-- PWA 與分享到主畫面設定 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="排班表">
    <meta name="application-name" content="排班表">
    
    <!-- 錢袋圖示 (深綠底 + 白色邊框錢袋 + $ 字樣) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23064e3b'/%3E%3Cpath d='M50 32 C45 32 40 25 35 27 C30 29 33 37 38 40 C30 46 24 56 24 68 C24 80 34 84 50 84 C66 84 76 80 76 68 C76 56 70 46 62 40 C67 37 70 29 65 27 C60 25 55 32 50 32 Z' fill='%230f5132' stroke='%23ffffff' stroke-width='4' stroke-linejoin='round'/%3E%3Cpath d='M36 41 C43 45 57 45 64 41' fill='none' stroke='%23ffffff' stroke-width='4' stroke-linecap='round'/%3E%3Ctext x='50' y='62' font-family='system-ui, -apple-system, sans-serif' font-weight='900' font-size='26' fill='%23ffffff' text-anchor='middle' dominant-baseline='central'%3E$%3C/text%3E%3C/svg%3E">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23064e3b'/%3E%3Cpath d='M50 32 C45 32 40 25 35 27 C30 29 33 37 38 40 C30 46 24 56 24 68 C24 80 34 84 50 84 C66 84 76 80 76 68 C76 56 70 46 62 40 C67 37 70 29 65 27 C60 25 55 32 50 32 Z' fill='%230f5132' stroke='%23ffffff' stroke-width='4' stroke-linejoin='round'/%3E%3Cpath d='M36 41 C43 45 57 45 64 41' fill='none' stroke='%23ffffff' stroke-width='4' stroke-linecap='round'/%3E%3Ctext x='50' y='62' font-family='system-ui, -apple-system, sans-serif' font-weight='900' font-size='26' fill='%23ffffff' text-anchor='middle' dominant-baseline='central'%3E$%3C/text%3E%3C/svg%3E">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    <!-- Lucide Icons UMD -->
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { 
            font-family: 'Inter', 'Microsoft JhengHei', sans-serif; 
            overscroll-behavior-y: contain; /* 避免下拉重新整理 */
        }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; height: 0px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .animate-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 滿版安全區域處理 (iOS) */
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        .safe-pt { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconData = lucide.icons[name];
            if (!iconData) return null;

            const [tagName, attributes, children] = iconData;

            return React.createElement(
                'svg',
                {
                    ...attributes,
                    width: size,
                    height: size,
                    className: `lucide lucide-${name.toLowerCase()} ${className}`,
                    xmlns: 'http://www.w3.org/2000/svg',
                },
                children.map((child, index) => 
                    React.createElement(child[0], { ...child[1], key: index })
                )
            );
        };

        const THEME_PALETTE = [
            { id: 'theme-1', color: 'text-yellow-400', border: 'border-yellow-400', bg: 'bg-yellow-400/10', lightColor: 'text-amber-950', lightBorder: 'border-yellow-500', lightBg: 'bg-amber-400' }, // 早班：暖黃底
            { id: 'theme-2', color: 'text-blue-400', border: 'border-blue-400', bg: 'bg-blue-400/10', lightColor: 'text-white', lightBorder: 'border-blue-500', lightBg: 'bg-blue-500' },          // 中班：藍底
            { id: 'theme-3', color: 'text-fuchsia-400', border: 'border-fuchsia-400', bg: 'bg-fuchsia-400/10', lightColor: 'text-white', lightBorder: 'border-fuchsia-500', lightBg: 'bg-purple-600' }, // 夜班：紫底
            { id: 'theme-4', color: 'text-emerald-400', border: 'border-emerald-400', bg: 'bg-emerald-400/10', lightColor: 'text-white', lightBorder: 'border-emerald-500', lightBg: 'bg-emerald-500' },
            { id: 'theme-5', color: 'text-rose-400', border: 'border-rose-400', bg: 'bg-rose-400/10', lightColor: 'text-white', lightBorder: 'border-rose-500', lightBg: 'bg-rose-500' },
            { id: 'theme-6', color: 'text-violet-400', border: 'border-violet-400', bg: 'bg-violet-400/10', lightColor: 'text-white', lightBorder: 'border-violet-500', lightBg: 'bg-indigo-600' },
        ];

        const OFF_SHIFT = {
            id: 'off',
            name: '休息',
            time: '放假放假٩(｡・ω・｡)﻿و', 
            color: 'text-slate-400',
            border: 'border-slate-600',
            bg: 'bg-slate-800/50',
            lightColor: 'text-slate-700',
            lightBorder: 'border-slate-300',
            lightBg: 'bg-slate-200'
        };

        const VACATION_SHIFT = {
            id: 'vacation',
            name: '特休', 
            time: 'ヽ(●´∀`●)ﾉ', 
            color: 'text-rose-400',
            border: 'border-rose-500',
            bg: 'bg-rose-500/10',
            lightColor: 'text-white',
            lightBorder: 'border-rose-500',
            lightBg: 'bg-rose-600'
        };

        const DAYS_IN_WEEK = ['日', '一', '二', '三', '四', '五', '六'];

        // 用來將舊版 UTC 偏移產生的 YYYY-MM-DD 字串轉換回對應的在地 local YYYY-MM-DD
        const migrateOldKeys = (oldSchedule) => {
            const newSchedule = {};
            
            const formatDateKeyOld = (date) => {
                try {
                    return date.toISOString().split('T')[0];
                } catch (e) {
                    return "";
                }
            };

            const formatDateKeyNew = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            Object.keys(oldSchedule).forEach(oldKey => {
                const parts = oldKey.split('-');
                if (parts.length === 3) {
                    const year = parseInt(parts[0], 10);
                    const month = parseInt(parts[1], 10) - 1;
                    const day = parseInt(parts[2], 10);

                    // 1. 先用當作本地日期測試
                    let guessDate = new Date(year, month, day);
                    
                    // 2. 如果舊版格式化方法輸出與 oldKey 一致，說明不需要平移
                    if (formatDateKeyOld(guessDate) === oldKey) {
                        newSchedule[formatDateKeyNew(guessDate)] = oldSchedule[oldKey];
                    } else {
                        // 3. 在 UTC+8 台灣時區，本地 00:00 對應 UTC 前一天 16:00，所以 oldKey 往往比正確的本地日期慢一天
                        let guessPlus = new Date(year, month, day + 1);
                        if (formatDateKeyOld(guessPlus) === oldKey) {
                            newSchedule[formatDateKeyNew(guessPlus)] = oldSchedule[oldKey];
                        } else {
                            // 4. 極端情況下向前退一天測試
                            let guessMinus = new Date(year, month, day - 1);
                            if (formatDateKeyOld(guessMinus) === oldKey) {
                                newSchedule[formatDateKeyNew(guessMinus)] = oldSchedule[oldKey];
                            } else {
                                // 5. 最後安全退路：使用原本猜測
                                newSchedule[formatDateKeyNew(guessDate)] = oldSchedule[oldKey];
                            }
                        }
                    }
                } else {
                    newSchedule[oldKey] = oldSchedule[oldKey];
                }
            });
            return newSchedule;
        };

        function App() {
            const [step, setStep] = useState(0); 
            const [scheduleName, setScheduleName] = useState('排班表');
            const [shifts, setShifts] = useState([
                { id: 'early', name: '日班', time: '07:00 - 15:00', themeIdx: 0 },
                { id: 'mid', name: '小夜', time: '15:00 - 23:00', themeIdx: 1 },
                { id: 'night', name: '大夜', time: '23:00 - 07:00', themeIdx: 2 },
            ]);
            const [areas, setAreas] = useState(['A', 'AF', 'B']);
            const [newAreaInput, setNewAreaInput] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(false); // 預設主題為淺色模式 (false)
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [schedule, setSchedule] = useState({});
            const [activeToolId, setActiveToolId] = useState('early'); 
            const [activeArea, setActiveArea] = useState('A');
            const [showStats, setShowStats] = useState(false);
            const [showSettingsModal, setShowSettingsModal] = useState(false); // 控制即時設定彈窗
            const [hasSetup, setHasSetup] = useState(false); // 標記是否曾完成設置

            // 自訂微光確認對話框 State (完全取代原生 confirm())
            const [confirmDialog, setConfirmDialog] = useState({
                isOpen: false,
                title: '',
                message: '',
                onConfirm: null
            });

            useEffect(() => {
                const saved = localStorage.getItem('shift-scheduler-data');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setScheduleName(parsed.name || '排班表');
                    setShifts(parsed.shifts || []);
                    setAreas(parsed.areas || []);
                    
                    // 執行舊資料庫時區校正，防範 5 天計成 6 天之偏差
                    let scheduleData = parsed.schedule || {};
                    if (parsed.version !== 2) {
                        scheduleData = migrateOldKeys(scheduleData);
                    }
                    setSchedule(scheduleData);

                    if (parsed.isDarkMode !== undefined) {
                        setIsDarkMode(parsed.isDarkMode);
                    }
                    setStep(4);
                    setHasSetup(true);
                }
            }, []);

            useEffect(() => {
                if (step >= 4) {
                    localStorage.setItem('shift-scheduler-data', JSON.stringify({
                        name: scheduleName, 
                        shifts, 
                        areas, 
                        schedule, 
                        isDarkMode,
                        version: 2 // 寫入版本號，未來無需重複進行 migration 運算
                    }));
                }
            }, [scheduleName, shifts, areas, schedule, isDarkMode, step]);

            // 修正時區偏移：改用本地時間格式化 (YYYY-MM-DD)，確保統計 100% 精準
            const formatDateKey = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };
            
            const getDaysInMonth = (date) => ({
                days: new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate(),
                firstDay: new Date(date.getFullYear(), date.getMonth(), 1).getDay()
            });

            // 修正時區偏移：直接用本地字串分割解析，保證統計不會漏數
            const monthStats = useMemo(() => {
                const stats = {};
                Object.keys(schedule).forEach(key => {
                    const parts = key.split('-'); // key 格式為 YYYY-MM-DD
                    if (parts.length === 3) {
                        const year = parseInt(parts[0], 10);
                        const month = parseInt(parts[1], 10) - 1; // 轉為 0-11
                        if (month === currentDate.getMonth() && year === currentDate.getFullYear()) {
                            const item = schedule[key];
                            if (item && item.type) {
                                stats[item.type] = (stats[item.type] || 0) + 1;
                            }
                        }
                    }
                });
                return stats;
            }, [schedule, currentDate]);

            const t = isDarkMode ? {
                bg: 'bg-slate-950', text: 'text-slate-100', textSub: 'text-slate-400', textMuted: 'text-slate-500',
                cardBg: 'bg-slate-900/80', cardBorder: 'border-slate-700', inputBg: 'bg-slate-800',
                accent: 'text-cyan-400', gridColor: 'rgba(255,255,255,0.03)', bottomBar: 'bg-slate-950/90 border-slate-800',
                modalBg: 'bg-slate-900', modalBorder: 'border-slate-700'
            } : {
                bg: 'bg-white', text: 'text-slate-900', textSub: 'text-slate-500', textMuted: 'text-slate-400',
                cardBg: 'bg-slate-50', cardBorder: 'border-slate-200', inputBg: 'bg-slate-100',
                accent: 'text-cyan-600', gridColor: 'rgba(0,0,0,0.02)', bottomBar: 'bg-white/95 border-slate-200',
                modalBg: 'bg-white', modalBorder: 'border-slate-200'
            };

            const handleDateClick = (day) => {
                const clickedDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
                const dateKey = formatDateKey(clickedDate);
                const isAlreadySelected = selectedDate.toDateString() === clickedDate.toDateString();
                
                setSelectedDate(clickedDate);

                if (!isAlreadySelected && schedule[dateKey]) return;

                if (activeToolId === 'clear') {
                    const newSchedule = { ...schedule };
                    delete newSchedule[dateKey];
                    setSchedule(newSchedule);
                } else {
                    setSchedule(prev => ({
                        ...prev,
                        [dateKey]: (activeToolId === 'off' || activeToolId === 'vacation') 
                            ? { type: activeToolId, area: '' } 
                            : { type: activeToolId, area: activeArea }
                    }));
                }
            };

            const getShiftConfig = (typeId) => {
                if (!typeId) return null;
                if (typeId === 'off') {
                    return { 
                        ...OFF_SHIFT, 
                        displayColor: isDarkMode ? OFF_SHIFT.color : OFF_SHIFT.lightColor, 
                        displayBg: isDarkMode ? OFF_SHIFT.bg : OFF_SHIFT.lightBg, 
                        displayBorder: isDarkMode ? OFF_SHIFT.border : 'border-transparent' 
                    };
                }
                if (typeId === 'vacation') {
                    return { 
                        ...VACATION_SHIFT, 
                        displayColor: isDarkMode ? VACATION_SHIFT.color : VACATION_SHIFT.lightColor, 
                        displayBg: isDarkMode ? VACATION_SHIFT.bg : VACATION_SHIFT.lightBg, 
                        displayBorder: isDarkMode ? VACATION_SHIFT.border : 'border-transparent' 
                    };
                }
                const shift = shifts.find(s => s.id === typeId);
                if (!shift) return null;
                const theme = THEME_PALETTE[shift.themeIdx % THEME_PALETTE.length];
                return { 
                    ...shift, 
                    ...theme, 
                    displayColor: isDarkMode ? theme.color : theme.lightColor, 
                    displayBg: isDarkMode ? theme.bg : theme.lightBg, 
                    displayBorder: isDarkMode ? theme.border : 'border-transparent' 
                };
            };

            // 當新增班表時，自動分發新的 themeIdx 確保不重複顏色
            const handleAddShift = () => {
                const newId = `shift_${Date.now()}`;
                const nextThemeIdx = shifts.length % THEME_PALETTE.length;
                setShifts([...shifts, { id: newId, name: '新班別', time: '09:00 - 18:00', themeIdx: nextThemeIdx }]);
            };

            const renderOnboarding = () => (
                <div className={`flex flex-col h-full p-6 transition-colors duration-500 ${t.bg}`}>
                    <div className="flex gap-2 mb-8 mt-4 safe-pt">
                        {[0, 1, 2, 3].map(i => <div key={i} className={`h-1 flex-1 rounded-full ${i <= step ? 'bg-cyan-400' : isDarkMode ? 'bg-slate-800' : 'bg-slate-200'}`}></div>)}
                    </div>
                    {step === 0 && (
                        <div className="flex-1 flex flex-col justify-center animate-in">
                            <h1 className={`text-3xl font-bold ${t.text} mb-2`}>開始您的<br/><span className="text-cyan-500">冒險計畫</span></h1>
                            <input type="text" value={scheduleName} onChange={(e) => setScheduleName(e.target.value)} placeholder="給班表取一個喜歡的名字" className={`bg-transparent border-b-2 ${t.cardBorder} text-2xl py-2 focus:border-cyan-400 focus:outline-none ${t.text}`}/>
                        </div>
                    )}
                    {step === 1 && (
                        <div className="flex-1 flex flex-col animate-in overflow-hidden">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className={`text-2xl font-bold ${t.text}`}>班表時段</h2>
                                <button onClick={handleAddShift} className="px-3 py-1.5 bg-cyan-500 hover:bg-cyan-600 text-white rounded-xl text-xs font-bold flex items-center gap-1 shadow-md shadow-cyan-500/10">
                                    <Icon name="Plus" size={14} /> 新增班別
                                </button>
                            </div>
                            <div className="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                                {shifts.map((shift, idx) => (
                                    <div key={shift.id} className={`p-4 rounded-xl border ${t.cardBg} ${t.cardBorder} relative group`}>
                                        {shifts.length > 1 && (
                                            <button 
                                                onClick={() => setShifts(shifts.filter(s => s.id !== shift.id))} 
                                                className="absolute top-3 right-3 text-red-500 opacity-60 hover:opacity-100 p-1"
                                                title="刪除此班別"
                                            >
                                                <Icon name="Trash2" size={14} />
                                            </button>
                                        )}
                                        <div className="flex items-center gap-3 mb-2">
                                            <div className={`w-3 h-3 rounded-full ${THEME_PALETTE[shift.themeIdx % THEME_PALETTE.length].lightBg} border ${THEME_PALETTE[shift.themeIdx % THEME_PALETTE.length].lightBorder}`}></div>
                                            <input value={shift.name} onChange={(e) => {const ns=[...shifts]; ns[idx].name=e.target.value; setShifts(ns);}} className={`bg-transparent font-bold ${t.text} focus:outline-none w-4/5`}/>
                                        </div>
                                        <div className={`flex items-center gap-2 ${t.textSub} text-sm ${t.inputBg} p-2 rounded-lg`}>
                                            <Icon name="Clock" size={14} />
                                            <input value={shift.time} onChange={(e) => {const ns=[...shifts]; ns[idx].time=e.target.value; setShifts(ns);}} className="bg-transparent focus:outline-none w-full font-mono"/>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    {step === 2 && (
                        <div className="flex-1 flex flex-col animate-in">
                            <h2 className={`text-2xl font-bold ${t.text} mb-6`}>值班區域</h2>
                            <div className="flex gap-2 mb-6">
                                <input type="text" value={newAreaInput} onChange={(e) => setNewAreaInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && newAreaInput.trim() && (setAreas([...areas, newAreaInput.trim()]), setNewAreaInput(''))} placeholder="新增區域..." className={`flex-1 ${t.inputBg} border ${t.cardBorder} rounded-lg px-4 py-3 ${t.text}`}/>
                            </div>
                            <div className="flex flex-wrap gap-2">{areas.map(a => <div key={a} className={`${t.inputBg} rounded-full px-4 py-2 flex items-center gap-2 ${t.text}`}>{a}<button onClick={() => setAreas(areas.filter(i=>i!==a))}><Icon name="X" size={14}/></button></div>)}</div>
                        </div>
                    )}
                    {step === 3 && (
                        <div className="flex-1 flex flex-col justify-center animate-in">
                            <h2 className={`text-2xl font-bold ${t.text} mb-4 text-center`}>準備就緒！</h2>
                            <div className="flex justify-center mb-8"><div className="w-20 h-20 bg-cyan-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-cyan-500/50"><Icon name="Check" size={40} /></div></div>
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className={`w-full py-4 rounded-xl border ${t.cardBorder} ${t.text} flex items-center justify-center gap-3 mb-4`}>
                                <Icon name={isDarkMode ? "Moon" : "Sun"} size={20}/>
                                {isDarkMode ? '切換為淺色模式' : '切換為深色模式'}
                            </button>
                            <button onClick={() => { 
                                setConfirmDialog({
                                    isOpen: true,
                                    title: '重置確認',
                                    message: '確定要清除所有自訂資料並重置嗎？',
                                    onConfirm: () => {
                                        localStorage.clear(); 
                                        window.location.reload();
                                    }
                                });
                            }} className={`w-full py-4 rounded-xl border border-red-500/30 text-red-500 flex items-center justify-center gap-3`}><Icon name="Trash2" size={18}/> 重置所有設定</button>
                        </div>
                    )}
                    
                    {/* 新增了「直接返回」按鈕，免去重複下一步的冗長路徑 */}
                    <div className="mt-auto flex justify-between py-4 safe-pb items-center">
                        {step > 0 && <button onClick={() => setStep(step-1)} className={t.textSub}>返回</button>}
                        <div className="flex gap-2 ml-auto">
                            {hasSetup && step < 4 && (
                                <button 
                                    onClick={() => setStep(4)} 
                                    className={`px-4 py-3 rounded-xl text-xs font-bold border ${t.cardBorder} ${t.textSub} hover:${t.text} transition-colors`}
                                >
                                    直接返回
                                </button>
                            )}
                            <button 
                                onClick={() => step < 3 ? setStep(step+1) : (setHasSetup(true), setStep(4))} 
                                className="bg-cyan-500 text-white px-6 py-3 rounded-xl text-xs font-bold shadow-lg shadow-cyan-500/20"
                            >
                                {step === 3 ? '完成' : '下一步'}
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderMainApp = () => {
                const { days, firstDay } = getDaysInMonth(currentDate);
                const sKey = formatDateKey(selectedDate);
                const sData = schedule[sKey];
                const sConfig = getShiftConfig(sData?.type);
                const todayStr = formatDateKey(new Date());

                return (
                    <div className={`flex flex-col h-full ${t.bg} relative transition-colors`}>
                        <div className="absolute inset-0 opacity-30 pointer-events-none" style={{ backgroundImage: `linear-gradient(${t.gridColor} 1px, transparent 1px), linear-gradient(90deg, ${t.gridColor} 1px, transparent 1px)`, backgroundSize: '40px 40px' }}></div>

                        <div className="relative z-10 p-4 shrink-0 safe-pt">
                            <div className={`${t.cardBg} border ${t.cardBorder} rounded-3xl p-6 shadow-xl`}>
                                <div className="flex justify-between items-start">
                                    <div className="flex-1">
                                        <h2 className={`${t.accent} text-[10px] font-mono tracking-widest uppercase mb-1 truncate`}>{scheduleName || '我的專屬計畫'}</h2>
                                        <div className={`text-2xl font-bold ${t.text}`}>{selectedDate.getMonth() + 1}月{selectedDate.getDate()}日 <span className={`text-sm font-normal ${t.textSub}`}>週{DAYS_IN_WEEK[selectedDate.getDay()]}</span></div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setShowStats(!showStats)} className={`${showStats ? 'text-cyan-400' : t.textMuted} hover:${t.text}`}><Icon name="BarChart3" size={18} /></button>
                                    </div>
                                </div>

                                {showStats ? (
                                    <div className="mt-6 grid grid-cols-5 gap-1 animate-in">
                                        {[...shifts, OFF_SHIFT, VACATION_SHIFT].map(s => (
                                            <div key={s.id} className="text-center">
                                                <span className={`text-[10px] ${t.textSub} block truncate`}>{s.name}</span>
                                                <span className={`text-lg font-black ${t.text}`}>{monthStats[s.id] || 0}</span>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="mt-6 flex items-center justify-between">
                                        <div>
                                            <span className={`text-[10px] ${t.textSub} uppercase tracking-wider block`}>工作時段</span>
                                            <span className={`text-lg font-mono ${t.text} truncate max-w-[180px] block`}>
                                                {sConfig ? sConfig.time : '-- : --'}
                                            </span>
                                        </div>
                                        <div className="text-right">
                                            <span className={`text-[10px] ${t.textSub} uppercase tracking-wider block`}>值班區域</span>
                                            <span className={`text-lg font-bold ${sData?.area ? t.text : t.textSub}`}>{sData?.area || '--'}</span>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="flex-1 relative z-10 px-3 overflow-y-auto custom-scrollbar">
                            <div className="flex items-center justify-between px-4 py-2">
                                <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} className={`p-2 rounded-full ${t.accent}`}><Icon name="ChevronLeft" size={24}/></button>
                                <h3 className={`text-xl font-black font-mono ${t.text}`}>{currentDate.getFullYear()}.{String(currentDate.getMonth() + 1).padStart(2, '0')}</h3>
                                <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} className={`p-2 rounded-full ${t.accent}`}><Icon name="ChevronRight" size={24}/></button>
                            </div>

                            <div className="grid grid-cols-7 gap-1 mb-2 text-center">
                                {DAYS_IN_WEEK.map((d, i) => (
                                    <div key={d} className={`text-[10px] ${i === 0 ? 'text-rose-500' : i === 6 ? 'text-cyan-500' : t.textSub} font-black`}>{d}</div>
                                ))}
                            </div>

                            <div className="grid grid-cols-7 gap-2 pb-48">
                                 {Array(firstDay).fill(null).map((_, i) => <div key={`e-${i}`} />)}
                                 {Array(days).fill(null).map((_, i) => {
                                   const day = i + 1;
                                   const dDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
                                   const dKey = formatDateKey(dDate);
                                   const itemData = schedule[dKey];
                                   const itemConfig = getShiftConfig(itemData?.type);
                                   const isSelected = selectedDate.toDateString() === dDate.toDateString();
                                   const isToday = dKey === todayStr;
                                   const dayOfWeek = dDate.getDay();

                                   // 確保「今日」與選中狀態的視覺效果最醒目
                                   let cellBorderClass = 'border-transparent';
                                   if (isSelected) {
                                       cellBorderClass = 'ring-2 ring-cyan-500 scale-105 z-20 shadow-xl';
                                   } else if (isToday) {
                                       cellBorderClass = 'border-cyan-500/90 ring-1 ring-cyan-500/40 shadow-[0_0_10px_rgba(6,182,212,0.25)]';
                                   } else if (itemConfig) {
                                       cellBorderClass = isDarkMode ? itemConfig.displayBorder : 'border-transparent';
                                   }

                                   let cellBgClass = '';
                                   if (!itemConfig) {
                                       cellBgClass = isToday 
                                           ? (isDarkMode ? 'bg-cyan-500/10' : 'bg-cyan-50') 
                                           : (isDarkMode ? 'bg-slate-900/40' : 'bg-slate-100');
                                   }

                                   return (
                                     <button 
                                       key={day} 
                                       onClick={() => handleDateClick(day)} 
                                       className={`
                                         relative aspect-[1/1.2] rounded-2xl border transition-all duration-300 p-1 flex flex-col justify-between overflow-hidden
                                         ${cellBorderClass}
                                         ${cellBgClass}
                                       `}
                                     >
                                       {/* 在淺色模式下 100% 滿色填充，在深色模式下保持 20% 優雅微透 */}
                                       {itemConfig && <div className={`absolute inset-0 ${itemConfig.displayBg} ${isDarkMode ? 'opacity-20' : 'opacity-100'}`}></div>}
                                       
                                       <div className="flex justify-between items-start z-10 w-full">
                                         {isToday ? (
                                             <span className="text-[10px] px-1.5 py-0.5 bg-cyan-500 text-white rounded-full font-black font-mono shadow-sm shadow-cyan-500/30">
                                               {day}
                                             </span>
                                         ) : (
                                             <span className={`text-[11px] font-mono font-bold ${
                                               isSelected 
                                                 ? 'text-cyan-500' 
                                                 : (itemConfig 
                                                     ? (isDarkMode ? 'text-slate-200' : itemConfig.displayColor) 
                                                     : (dayOfWeek === 0 ? 'text-rose-500' : dayOfWeek === 6 ? 'text-cyan-500' : t.textSub)
                                                   )
                                             }`}>
                                               {day}
                                             </span>
                                         )}
                                         
                                         {/* 升級為動態呼吸定位點（脈衝波紋效果） */}
                                         {isToday && (
                                             <div className="relative flex h-2.5 w-2.5 mt-0.5 mr-0.5">
                                                 <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                                                 <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-cyan-500 shadow-sm shadow-cyan-500/50"></span>
                                             </div>
                                         )}
                                       </div>

                                       {itemConfig && (
                                         <div className="flex-1 flex flex-col items-center justify-center gap-1 z-10 w-full">
                                           <span className={`text-[12px] font-black leading-none ${isDarkMode ? itemConfig.displayColor : itemConfig.displayColor}`}>
                                             {itemConfig.name.substring(0, 2)}
                                           </span>
                                           {itemData.area && (
                                             <div className={`px-1 rounded-[4px] ${isDarkMode ? 'bg-white/10' : 'bg-black/10'} max-w-[90%] truncate`}>
                                               <p className={`text-[7px] truncate font-bold ${isDarkMode ? 'text-slate-200' : itemConfig.displayColor}`}>{itemData.area}</p>
                                             </div>
                                           )}
                                         </div>
                                       )}
                                     </button>
                                   )
                                 })}
                            </div>
                        </div>

                        {/* 底部排班工具列 */}
                        <div className={`fixed bottom-0 left-0 w-full ${t.bottomBar} backdrop-blur-2xl border-t pt-4 pb-12 px-4 z-40 rounded-t-[2.5rem] shadow-2xl safe-pb`}>
                           <div className="flex items-center gap-3 mb-4 overflow-x-auto no-scrollbar">
                             <button onClick={() => setActiveToolId('clear')} className={`p-3 rounded-2xl transition-all border shrink-0 ${activeToolId === 'clear' ? 'bg-red-500 text-white border-red-400 shadow-[0_0_15px_rgba(239,68,68,0.4)]' : `${t.inputBg} ${t.textSub} border-transparent`}`}><Icon name="Eraser" size={20}/></button>
                             
                             <div className="flex items-center gap-1 bg-cyan-500/10 rounded-2xl p-1 border border-cyan-500/20 shrink-0">
                               <Icon name="MapPin" size={14} className="text-cyan-500 ml-2" />
                               <select value={activeArea} onChange={(e) => setActiveArea(e.target.value)} className={`bg-transparent text-sm font-black ${t.text} p-2 focus:outline-none w-24`}>
                                 {areas.map(a => <option key={a} value={a}>{a}</option>)}
                               </select>
                             </div>

                             <div className="flex gap-2 shrink-0">
                               {shifts.map(s => {
                                 const cfg = getShiftConfig(s.id);
                                 const active = activeToolId === s.id;
                                 return (
                                   <button 
                                     key={s.id} 
                                     onClick={() => setActiveToolId(s.id)} 
                                     className={`px-4 py-2.5 rounded-2xl text-xs font-black whitespace-nowrap transition-all border ${
                                       active 
                                         ? (isDarkMode 
                                             ? `${cfg.bg} ${cfg.color} ${cfg.border} shadow-[0_0_15px_rgba(34,211,238,0.2)]` 
                                             : `${cfg.lightBg} ${cfg.lightColor} border-transparent`) 
                                         : `${t.inputBg} ${t.textSub} border-transparent`
                                     }`}
                                   >
                                     {s.name}
                                   </button>
                                 )
                               })}
                               <button 
                                 onClick={() => setActiveToolId('off')} 
                                 className={`px-4 py-2.5 rounded-2xl text-xs font-black border transition-all shrink-0 ${
                                   activeToolId === 'off' 
                                     ? (isDarkMode ? 'bg-slate-700 text-white border-slate-500' : 'bg-slate-300 text-slate-800 border-transparent') 
                                     : `${t.inputBg} ${t.textSub} border-transparent`
                                 }`}
                               >
                                 休息
                               </button>
                               <button 
                                 onClick={() => setActiveToolId('vacation')} 
                                 className={`px-4 py-2.5 rounded-2xl text-xs font-black border transition-all shrink-0 ${
                                   activeToolId === 'vacation' 
                                     ? (isDarkMode ? 'bg-rose-950 text-rose-400 border-rose-500 shadow-[0_0_15px_rgba(244,63,94,0.2)]' : 'bg-rose-600 text-white border-transparent') 
                                     : `${t.inputBg} ${t.textSub} border-transparent`
                                 }`}
                               >
                                 特休
                               </button>
                             </div>
                           </div>

                           <div className="flex justify-between items-center px-2">
                             <button onClick={() => { 
                                setConfirmDialog({
                                    isOpen: true,
                                    title: '清空本月班表',
                                    message: `您確定要清除 ${currentDate.getFullYear()} 年 ${currentDate.getMonth() + 1} 月的所有排班與特休記錄嗎？`,
                                    onConfirm: () => {
                                        const ns = {...schedule}; 
                                        Object.keys(ns).forEach(k => { 
                                            const parts = k.split('-');
                                            if (parts.length === 3) {
                                                const year = parseInt(parts[0], 10);
                                                const month = parseInt(parts[1], 10) - 1;
                                                if (month === currentDate.getMonth() && year === currentDate.getFullYear()) {
                                                    delete ns[k];
                                                }
                                            }
                                        }); 
                                        setSchedule(ns); 
                                    }
                                });
                             }} className={`text-[10px] font-bold text-red-400 flex items-center gap-1 opacity-60 hover:opacity-100 transition-opacity`}><Icon name="Trash2" size={12}/> 清空本月</button>
                             <div className={`w-12 h-1.5 ${isDarkMode ? 'bg-slate-800' : 'bg-slate-200'} rounded-full opacity-40`}></div>
                             <button onClick={() => setShowSettingsModal(true)} className={`${t.textSub} hover:${t.text} transition-colors p-1`}><Icon name="Settings" size={16}/></button>
                           </div>
                        </div>

                        {/* 即時設定彈窗 (Settings Modal Overlay) */}
                        {showSettingsModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-xs animate-in">
                                <div className={`w-full max-w-[340px] ${t.modalBg} border ${t.modalBorder} rounded-[2rem] p-6 shadow-2xl`}>
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className={`text-xl font-bold ${t.text} flex items-center gap-2`}>
                                            <Icon name="Settings" size={20} className="text-cyan-500" />
                                            設定管理
                                        </h3>
                                        <button onClick={() => setShowSettingsModal(false)} className={`${t.textSub} hover:${t.text}`}>
                                            <Icon name="X" size={20} />
                                        </button>
                                    </div>

                                    <div className="space-y-4">
                                        <div>
                                            <label className={`block text-xs font-bold ${t.textSub} mb-2`}>排班表標題</label>
                                            <input 
                                                type="text" 
                                                value={scheduleName} 
                                                onChange={(e) => setScheduleName(e.target.value)} 
                                                className={`w-full px-4 py-2 rounded-xl text-sm ${t.inputBg} border ${t.cardBorder} ${t.text} focus:outline-none focus:ring-1 focus:ring-cyan-500`}
                                            />
                                        </div>

                                        {/* 核心新增：班表時段、值班區域 修改捷徑 */}
                                        <div>
                                            <label className={`block text-xs font-bold ${t.textSub} mb-2`}>班表配置修改</label>
                                            <div className="grid grid-cols-2 gap-2">
                                                <button 
                                                    onClick={() => {
                                                        setStep(1); // 跳轉到時段編輯頁面
                                                        setShowSettingsModal(false);
                                                    }}
                                                    className={`py-2.5 px-3 rounded-xl border ${t.cardBorder} ${t.text} flex items-center justify-center gap-2 ${t.inputBg} text-xs font-bold hover:brightness-95 transition-all`}
                                                >
                                                    <Icon name="Clock" size={14} className="text-cyan-500" />
                                                    修改時段 (班別)
                                                </button>
                                                <button 
                                                    onClick={() => {
                                                        setStep(2); // 跳轉到值班區域編輯頁面
                                                        setShowSettingsModal(false);
                                                    }}
                                                    className={`py-2.5 px-3 rounded-xl border ${t.cardBorder} ${t.text} flex items-center justify-center gap-2 ${t.inputBg} text-xs font-bold hover:brightness-95 transition-all`}
                                                >
                                                    <Icon name="MapPin" size={14} className="text-cyan-500" />
                                                    修改值班區域
                                                </button>
                                            </div>
                                        </div>

                                        <div>
                                            <label className={`block text-xs font-bold ${t.textSub} mb-2`}>外觀主題</label>
                                            <button 
                                                onClick={() => setIsDarkMode(!isDarkMode)} 
                                                className={`w-full py-3 px-4 rounded-xl border ${t.cardBorder} ${t.text} flex items-center justify-center gap-3 ${t.inputBg} transition-colors`}
                                            >
                                                <Icon name={isDarkMode ? "Sun" : "Moon"} size={18}/>
                                                切換為 {isDarkMode ? '淺色模式 (填滿)' : '深色模式 (外框)'}
                                            </button>
                                        </div>

                                        <div className="pt-2 border-t border-dashed border-slate-700/20">
                                            <button 
                                                onClick={() => { 
                                                    setConfirmDialog({
                                                        isOpen: true,
                                                        title: '重置排班表',
                                                        message: '此操作將清空所有的排班記錄、考勤數據、自訂班別與時段！這將不可回復。確定要繼續嗎？',
                                                        onConfirm: () => {
                                                            localStorage.clear(); 
                                                            window.location.reload(); 
                                                        }
                                                    });
                                                }} 
                                                className="w-full py-3 px-4 rounded-xl border border-red-500/20 text-red-500 flex items-center justify-center gap-3 bg-red-500/5 hover:bg-red-500/10 transition-colors"
                                            >
                                                <Icon name="Trash2" size={16}/> 
                                                重置所有設定
                                            </button>
                                        </div>
                                    </div>

                                    <button 
                                        onClick={() => setShowSettingsModal(false)} 
                                        className="mt-6 w-full py-3 bg-cyan-500 text-white font-bold rounded-xl shadow-lg shadow-cyan-500/20"
                                    >
                                        確認並返回
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 自訂對話確認框 - 替換原生 confirm 彈窗 */}
                        {confirmDialog.isOpen && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-in">
                                <div className={`w-full max-w-[320px] ${t.modalBg} border ${t.modalBorder} rounded-[2rem] p-6 shadow-2xl`}>
                                    <h3 className={`text-lg font-bold ${t.text} mb-2`}>{confirmDialog.title}</h3>
                                    <p className={`text-sm ${t.textSub} mb-6 leading-relaxed`}>{confirmDialog.message}</p>
                                    <div className="flex gap-3">
                                        <button 
                                            onClick={() => setConfirmDialog(prev => ({ ...prev, isOpen: false }))}
                                            className={`flex-1 py-2.5 rounded-xl border ${t.cardBorder} ${t.text} text-sm font-semibold`}
                                        >
                                            取消
                                        </button>
                                        <button 
                                            onClick={() => {
                                                if (confirmDialog.onConfirm) confirmDialog.onConfirm();
                                                setConfirmDialog(prev => ({ ...prev, isOpen: false }));
                                            }}
                                            className="flex-1 py-2.5 bg-red-500 text-white rounded-xl text-sm font-semibold shadow-lg shadow-red-500/20"
                                        >
                                            確定
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className={`min-h-screen ${isDarkMode ? 'bg-black' : 'bg-slate-50'} flex items-center justify-center font-sans transition-colors duration-700`}>
                    <div className={`w-full max-w-[420px] h-[100dvh] md:h-[850px] ${t.bg} md:rounded-[3.5rem] shadow-2xl overflow-hidden relative border-x-0 md:border-[10px] ${isDarkMode ? 'border-slate-900 ring-1 ring-white/10' : 'border-white ring-1 ring-black/5'} flex flex-col`}>
                        {step < 4 ? renderOnboarding() : renderMainApp()}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
